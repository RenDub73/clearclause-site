<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClearClause — AI Contract Review</title>
    <meta name="description" content="ClearClause is a browser extension that reviews contracts and Terms of Service in plain English, flagging risky clauses before you sign." />
    <style>
      :root {
        --navy: #0b1e3f;
        --gold: #b8893c;
        --ink: #17212f;
        --ink-muted: #4a5568;
        --cream: #f7f3ec;
        --cream-2: #ece5d7;
        --border: #d8cfbd;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--cream);
        color: var(--ink);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-size: 17px;
        line-height: 1.6;
      }
      .hero {
        max-width: 760px;
        margin: 0 auto;
        padding: 96px 24px 40px;
        text-align: center;
      }
      .mark {
        width: 72px; height: 72px;
        background: var(--navy);
        color: var(--gold);
        border-radius: 12px;
        display: grid; place-items: center;
        font-size: 42px; font-weight: bold;
        font-family: Georgia, serif;
        margin: 0 auto 22px;
      }
      h1 {
        font-family: Georgia, "Charter", serif;
        font-size: 48px;
        letter-spacing: 2px;
        color: var(--navy);
        margin: 0 0 10px;
      }
      .tag {
        font-size: 19px;
        color: var(--ink-muted);
        margin: 0 0 40px;
      }
      .lede {
        font-family: Georgia, serif;
        font-size: 20px;
        color: var(--ink);
        max-width: 580px;
        margin: 0 auto 36px;
      }
      .cta {
        display: inline-block;
        background: var(--navy);
        color: var(--cream);
        font-weight: 600;
        padding: 14px 26px;
        border-radius: 8px;
        text-decoration: none;
        border: 1px solid var(--navy);
        transition: background 0.15s, color 0.15s;
      }
      .cta:hover { background: var(--gold); border-color: var(--gold); color: var(--navy); }
      footer {
        max-width: 760px;
        margin: 60px auto 0;
        padding: 24px;
        border-top: 1px solid var(--border);
        color: var(--ink-muted);
        font-size: 14px;
        text-align: center;
      }
      footer a { color: var(--navy); }
    </style>
  </head>
  <body>
    <section class="hero">
      <div class="mark">§</div>
      <h1>CLEARCLAUSE</h1>
      <p class="tag">AI contract review in plain English.</p>
      <p class="lede">
        ClearClause is a Chrome extension that reviews the contract, Terms of Service,
        or legal PDF in your browser tab and flags the clauses that could hurt you —
        before you sign.
      </p>
      <a class="cta" href="https://chrome.google.com/webstore" aria-label="Install on Chrome Web Store">
        Install on Chrome
      </a>
    </section>

    <footer>
      &copy; 2026 RW Consulting, Inc. &middot;
      <a href="./privacy.html">Privacy Policy</a> &middot;
      <a href="mailto:renierwalters@gmail.com">Contact</a>
    </footer>
  </body>
</html>
